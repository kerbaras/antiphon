# Dev/test infrastructure. The app server itself runs on the host (pnpm dev) —
# WebRTC needs real UDP, so only backing services are containerized.
services:
  postgres:
    image: postgres:18
    environment:
      POSTGRES_USER: antiphon
      POSTGRES_PASSWORD: antiphon
      POSTGRES_DB: antiphon
    ports:
      - "5433:5432"
    volumes:
      # postgres:18+ images keep PGDATA in a subdirectory of this mount.
      - pgdata:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U antiphon"]
      interval: 5s
      timeout: 3s
      retries: 10

  # Optional: local S3 for exercising the prod blob driver (BLOB_DRIVER=s3).
  # `docker compose up -d minio`, then see the MinIO block in
  # apps/server/.env.example. No mc side-car — the server's ensureBucket()
  # creates the bucket at boot.
  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: antiphon
      MINIO_ROOT_PASSWORD: antiphon-secret
    ports:
      - "9100:9000" # S3 API
      - "9101:9001" # web console
    volumes:
      - miniodata:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  pgdata:
  miniodata:
