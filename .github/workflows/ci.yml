name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always

jobs:
  rust:
    name: Rust (fmt, clippy, test)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      # rust-toolchain.toml pins the toolchain; rustup picks it up automatically
      - uses: Swatinem/rust-cache@v2
      - run: cargo fmt --all --check
      - run: cargo clippy --workspace --all-targets -- -D warnings
      - run: cargo test --workspace
      # Criterion benches (W3-E) must at least keep compiling and linking.
      - run: cargo bench --workspace --no-run

  ts:
    name: TypeScript (lint, typecheck, test, build)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    services:
      postgres:
        image: postgres:18
        env:
          POSTGRES_USER: antiphon
          POSTGRES_PASSWORD: antiphon
          POSTGRES_DB: antiphon
        ports:
          - "5433:5432"
        options: >-
          --health-cmd "pg_isready -U antiphon"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10
      # A Bitnami-style MinIO starts standalone with no command override
      # (the official minio/minio image needs `server /data` args, which
      # services can't pass). Pin rationale (2026-07): Bitnami's registry
      # reshuffle DELETED docker.io/bitnami/minio — the frozen archive lives
      # at docker.io/bitnamilegacy/minio — and MinIO community went
      # source-only (minio/minio#21647), so no maintained public image
      # exists; every option is a frozen snapshot. Digest-pinned (multi-arch
      # manifest list, verified standalone-start + /minio/health/ready) so a
      # tag reshuffle can never swap bytes under us. Fine for CI: ephemeral
      # store, throwaway credentials, never exposed. Buckets are created by
      # the server's ensureBucket(); the health gate below keeps the S3
      # suite from silently self-skipping when :9100 is unreachable.
      minio:
        image: bitnamilegacy/minio:2025.7.23-debian-12-r5@sha256:6dabb4a2088c9a79908de3bc05f4586c23ad2182c8908e7e3acbf61c1467fb20
        env:
          MINIO_ROOT_USER: antiphon
          MINIO_ROOT_PASSWORD: antiphon-secret
        ports:
          - "9100:9000"
        options: >-
          --health-cmd "curl -f http://localhost:9000/minio/health/ready"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10
    steps:
      - uses: actions/checkout@v4
      - uses: Swatinem/rust-cache@v2
        with:
          # wasm build runs inside turbo; share the cargo cache
          shared-key: wasm
      - name: Install wasm-pack
        run: curl https://rustwasm.github.io/wasm-pack/installer/init.sh -sSf | sh
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
      - name: Turbo cache
        uses: actions/cache@v4
        with:
          path: .turbo
          key: turbo-${{ runner.os }}-${{ github.sha }}
          restore-keys: turbo-${{ runner.os }}-
      - run: pnpm install --frozen-lockfile
      - run: pnpm lint
      - run: pnpm turbo run build typecheck test --cache-dir=.turbo
        env:
          TEST_DATABASE_URL: postgres://antiphon:antiphon@localhost:5433/antiphon

  e2e:
    name: E2E (Playwright)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: ts
    services:
      postgres:
        image: postgres:18
        env:
          POSTGRES_USER: antiphon
          POSTGRES_PASSWORD: antiphon
          POSTGRES_DB: antiphon
        ports:
          - "5433:5432"
        options: >-
          --health-cmd "pg_isready -U antiphon"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10
    steps:
      - uses: actions/checkout@v4
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: wasm
      - name: Install wasm-pack
        run: curl https://rustwasm.github.io/wasm-pack/installer/init.sh -sSf | sh
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
      - name: Turbo cache
        uses: actions/cache@v4
        with:
          path: .turbo
          key: turbo-${{ runner.os }}-${{ github.sha }}
          restore-keys: turbo-${{ runner.os }}-
      - run: pnpm install --frozen-lockfile
      # The signal suites assume 48 kHz capture (the RFC's RECOMMENDED rate,
      # and what every dev machine delivers). Runners have no audio server,
      # and Chromium's fallback rate without one is 44.1 kHz — every sample
      # count then drifts by exactly 48/44.1. PulseAudio's own default is
      # ALSO 44.1 kHz, so pin 48 kHz explicitly.
      - name: 48 kHz audio server
        run: |
          sudo apt-get update -qq && sudo apt-get install -y -qq pulseaudio
          mkdir -p ~/.config/pulse
          printf 'default-sample-rate = 48000\n' > ~/.config/pulse/daemon.conf
          pulseaudio -D --exit-idle-time=-1
      # chromium: desktop suite (fake mic). webkit: the mobile-safari project
      # (devices["iPhone 15"] runs on the webkit build — nothing extra needed).
      - run: pnpm exec playwright install --with-deps chromium webkit
        working-directory: e2e
      - run: pnpm turbo run test:e2e --cache-dir=.turbo
        env:
          DATABASE_URL: postgres://antiphon:antiphon@localhost:5433/antiphon
      - name: Upload Playwright report
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-report
          path: e2e/playwright-report/
          retention-days: 7
          if-no-files-found: ignore
