name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always

jobs:
  rust:
    name: Rust (fmt, clippy, test)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      # rust-toolchain.toml pins the toolchain; rustup picks it up automatically
      - uses: Swatinem/rust-cache@v2
      - run: cargo fmt --all --check
      - run: cargo clippy --workspace --all-targets -- -D warnings
      - run: cargo test --workspace

  ts:
    name: TypeScript (lint, typecheck, test, build)
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:18
        env:
          POSTGRES_USER: antiphon
          POSTGRES_PASSWORD: antiphon
          POSTGRES_DB: antiphon
        ports:
          - "5433:5432"
        options: >-
          --health-cmd "pg_isready -U antiphon"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10
    steps:
      - uses: actions/checkout@v4
      - uses: Swatinem/rust-cache@v2
        with:
          # wasm build runs inside turbo; share the cargo cache
          shared-key: wasm
      - name: Install wasm-pack
        run: curl https://rustwasm.github.io/wasm-pack/installer/init.sh -sSf | sh
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
      - name: Turbo cache
        uses: actions/cache@v4
        with:
          path: .turbo
          key: turbo-${{ runner.os }}-${{ github.sha }}
          restore-keys: turbo-${{ runner.os }}-
      - run: pnpm install --frozen-lockfile
      - run: pnpm lint
      - run: pnpm turbo run build typecheck test --cache-dir=.turbo
        env:
          TEST_DATABASE_URL: postgres://antiphon:antiphon@localhost:5433/antiphon

  e2e:
    name: E2E (Playwright)
    runs-on: ubuntu-latest
    needs: ts
    services:
      postgres:
        image: postgres:18
        env:
          POSTGRES_USER: antiphon
          POSTGRES_PASSWORD: antiphon
          POSTGRES_DB: antiphon
        ports:
          - "5433:5432"
        options: >-
          --health-cmd "pg_isready -U antiphon"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10
    steps:
      - uses: actions/checkout@v4
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: wasm
      - name: Install wasm-pack
        run: curl https://rustwasm.github.io/wasm-pack/installer/init.sh -sSf | sh
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
      - name: Turbo cache
        uses: actions/cache@v4
        with:
          path: .turbo
          key: turbo-${{ runner.os }}-${{ github.sha }}
          restore-keys: turbo-${{ runner.os }}-
      - run: pnpm install --frozen-lockfile
      - run: pnpm exec playwright install --with-deps chromium webkit
        working-directory: e2e
      - run: pnpm turbo run test:e2e --cache-dir=.turbo
        env:
          DATABASE_URL: postgres://antiphon:antiphon@localhost:5433/antiphon
